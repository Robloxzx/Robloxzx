<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#fff6e5;
padding:30px;
}

.login{
max-width:400px;
margin:auto;
text-align:center;
}

.panel{
display:none;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
background:#f4b942;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginBox">

<h2>Admin Login</h2>

<form onsubmit="login(); return false;">

<input 
id="password" 
type="password" 
placeholder="Enter Password">

<button type="submit">
Login
</button>

</form>

</div>

<!-- PANEL -->

<div class="panel" id="panelBox">

<h2>Script Manager</h2>

<input id="title" placeholder="Title">

<input id="category" placeholder="Category (blox/anime/sim)">

<input id="thumb" placeholder="Paste YouTube URL or Image Thumbnail URL">

<textarea id="script" placeholder="Script Code"></textarea>

<button onclick="addScript()">
➕ Add Script
</button>

<hr>

<h3>All Scripts</h3>

<input 
id="searchInput" 
placeholder="🔎 Search Script"
oninput="searchScript()">

<div id="list"></div>

</div>

<script>
window.data = window.data || { scripts: [], trending: [] };
</script>

  
<script src="database.js"></script>
  
<script>
  
/* PASSWORD */

const ADMIN_PASSWORD="551901";



function login(){

let pass=document
.getElementById("password")
.value
.trim();

if(pass===ADMIN_PASSWORD){

console.log("Login button pressed");
  
document.getElementById("loginBox").style.display="none";

document.getElementById("panelBox").style.display="block";

setTimeout(loadScripts, 100);

}else{

alert("Wrong Password");

}

}


/* LOAD DATA */

function loadScripts(){

console.log("loadScripts called");

/* ถ้า database.js ไม่โหลด */

if(typeof data === "undefined"){

alert("database.js โหลดไม่สำเร็จ");
return;

}

console.log("DATA =", data);

/* กัน scripts/trending หาย */

if(!data.scripts){
data.scripts=[];
}

if(!data.trending){
data.trending=[];
}

render();

}
/* RENDER */

function render(){

console.log("Rendering scripts:", data.scripts);

let list=document.getElementById("list");

list.innerHTML="";

data.scripts.forEach((s,i)=>{

list.innerHTML+=createCard(s,i);

});

}

/* CREATE CARD */

function createCard(s,i){

return `

<div class="card">

<img src="${s.thumb}" width="120" style="border-radius:8px"><br>

<b>${s.title}</b>
<br>

<small>Category: ${s.category}</small>

${s.trending 
? "<div style='color:green'>⭐ Trending</div>" 
: "<div style='color:gray'>⬜ Normal</div>"}

<br>

<button onclick="editScript(${i})">
✏️ Edit
</button>

<button onclick="deleteScript(${i})">
❌ Delete
</button>

<button onclick="toggleTrending(${i})">
${s.trending ? "⭐ Remove Trending" : "⭐ Set Trending"}
</button>

</div>

`;

}

/* SEARCH */

function searchScript(){

let keyword=document
.getElementById("searchInput")
.value
.toLowerCase();

if(keyword===""){
render();
return;
}

let list=document.getElementById("list");

list.innerHTML="";

data.scripts
.filter(s =>
s.title.toLowerCase().includes(keyword)
)
.forEach((s,i)=>{

list.innerHTML+=createCard(s,i);

});

}

/* ADD SCRIPT */

function addScript(){

let thumbInput=document.getElementById("thumb").value;
  
let title=document.getElementById("title").value.trim();
let category=document.getElementById("category").value.trim();

if(title==="" || category===""){
alert("Title and Category required");
return;
}

/* YouTube → Thumbnail */

if(
thumbInput.includes("youtube.com") || 
thumbInput.includes("youtu.be")
){

let videoId="";

if(thumbInput.includes("watch?v=")){
videoId=thumbInput.split("watch?v=")[1].split("&")[0];
}

if(thumbInput.includes("youtu.be/")){
videoId=thumbInput.split("youtu.be/")[1].split("?")[0];
}

if(videoId){
thumbInput=
"https://img.youtube.com/vi/"
+videoId+
"/maxresdefault.jpg";
}

}

let scriptText=
document
.getElementById("script")
.value
.trim();

if(scriptText===""){

alert("Script cannot be empty");
return;

}

/* CREATE */

let newScript={

id:Date.now(),

title:title,
category:category,

thumb:thumbInput,

script:scriptText,

trending:false

};

data.scripts.push(newScript);

download();

render();

/* CLEAR FORM */

document.getElementById("title").value="";
document.getElementById("category").value="";
document.getElementById("thumb").value="";
document.getElementById("script").value="";

}

/* EDIT */

function editScript(index){

let s=data.scripts[index];

document.getElementById("title").value=s.title;
document.getElementById("category").value=s.category;
document.getElementById("thumb").value=s.thumb;
document.getElementById("script").value=s.script;

/* remove old */

data.scripts.splice(index,1);

download();

render();

}

/* DELETE */

function deleteScript(index){

if(!confirm("Delete this script?")) return;

data.scripts.splice(index,1);

download();

render();

}

/* TRENDING */

function toggleTrending(index){

let script=data.scripts[index];

let count=
data.scripts
.filter(s=>s.trending)
.length;

/* limit 3 */

if(!script.trending){

if(count>=3){

alert("Trending ได้สูงสุด 3 ตัว");
return;

}

}

script.trending=!script.trending;

download();

render();

}

/* SAVE */

function download(){

/* บันทึกข้อมูลแบบตรง */

let jsText =
"var data = " +
JSON.stringify(data,null,2) +
";";

/* export เป็น JS */

let blob=new Blob(
[jsText],
{type:"application/javascript"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="database.js";

a.click();

}

</script>

</body>
</html>
