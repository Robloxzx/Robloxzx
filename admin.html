<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#fff6e5;
padding:30px;
}

.login{
max-width:400px;
margin:auto;
text-align:center;
}

.panel{
display:none;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
background:#f4b942;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginBox">

<h2>Admin Login</h2>

<form onsubmit="login(); return false;">

<div style="position:relative;">

<input 
id="password" 
type="password" 
placeholder="Enter Password">



</div>

<br>

<button type="submit">
Login
</button>

</form>

</div>

<!-- PANEL -->

<div class="panel" id="panelBox">

<h2>Script Manager</h2>

<input id="title" placeholder="Title">

<input id="category" placeholder="Category (blox/anime/sim)">

<input id="thumb" placeholder="Paste YouTube URL or Image Thumbnail URL">

<textarea id="script" placeholder="Script Code"></textarea>

<button onclick="addScript()">
➕ Add Script
</button>

<!-- ✅ เพิ่มตรงนี้ -->

<input 
type="file" 
id="importFile"
accept=".json"
style="display:none"
onchange="importDatabase(event)">

<button onclick="document.getElementById('importFile').click()">
📂 Import Database
</button>

<button onclick="download()">
💾 Export Database
</button>
  
<hr>

<h3>All Scripts</h3>

<input 
id="searchInput" 
placeholder="🔎 Search Script"
oninput="searchScript()">

<div id="list"></div>


</div>

<script>

let data = { scripts: [], trending: [] };
let dbLoaded = false;

fetch("database.json")
.then(res => res.json())
.then(db => {

data = db;

console.log("Database loaded:", data);

dbLoaded = true;

})
.catch(err => {

console.error("โหลด database.json ไม่สำเร็จ", err);

dbLoaded = true; // ✅ เพิ่มบรรทัดนี้

});
</script>

<script>
  
/* PASSWORD */

const ADMIN_PASSWORD="551901";



function login(){

let pass=document
.getElementById("password")
.value
.trim();

if(pass===ADMIN_PASSWORD){

if(!dbLoaded){

alert("Database ยังโหลดไม่เสร็จ กรุณารอสักครู่");
return;

}

console.log("Login button pressed");
  
document.getElementById("loginBox").style.display="none";

document.getElementById("panelBox").style.display="block";

loadScripts();

}else{

alert("Wrong Password");

}

}


/* LOAD DATA */

function loadScripts(){

console.log("loadScripts called");

/* ถ้า database.js ไม่โหลด */



console.log("DATA =", data);

/* กัน scripts/trending หาย */

if(!data.scripts){
data.scripts=[];
}

if(!data.trending){
data.trending=[];
}

render();

}
/* RENDER */

function render(){

console.log("Rendering scripts:", data.scripts);

let list=document.getElementById("list");

list.innerHTML="";

/* ใช้ copy ก่อน sort */

[...data.scripts]
.sort((a,b)=>b.id-a.id)
.forEach((s)=>{
list.innerHTML+=createCard(s);

});

}

/* CREATE CARD */

function createCard(s){

return `

<div class="card">

<img src="${s.thumb}" width="120" style="border-radius:8px"><br>

<b>${s.title.substring(0,80)}</b>
<br>

<small>Category: ${s.category}</small>
<pre style="max-height:80px;overflow:auto;background:#f5f5f5;padding:6px;border-radius:6px;">
${escapeHTML(
s.script.substring(0,200)
)}
</pre>

${s.trending 
? "<div style='color:green'>⭐ Trending</div>" 
: "<div style='color:gray'>⬜ Normal</div>"}

<br>

<button onclick="editScript(${s.id})">
✏️ Edit
</button>

<button onclick="deleteScript(${s.id})">
❌ Delete
</button>

<button onclick="toggleTrending(${s.id})">
${s.trending ? "⭐ Remove Trending" : "⭐ Set Trending"}
</button>

<button onclick="previewScript(${s.id})">
👁 Preview
</button>

</div>

`;

}

/* SEARCH */

function searchScript(){

let keyword=document
.getElementById("searchInput")
.value
.toLowerCase();

if(keyword===""){
render();
return;
}

let list=document.getElementById("list");

list.innerHTML="";

[...data.scripts]
.filter(s =>
s.title.toLowerCase().includes(keyword)
)
.sort((a,b)=>b.id-a.id)
.forEach((s)=>{

list.innerHTML+=createCard(s);

});

}


function encodeBase64(text){

try{

return btoa(
unescape(
encodeURIComponent(text)
)
);

}catch(e){

console.warn("Encode error:", e);

return "";

}

}

function escapeHTML(text){

return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");

}

function decodeBase64(text){

if(!text) return "";

try{

return decodeURIComponent(
escape(
atob(text)
)
);

}catch(e){

console.warn("Decode error:", e);

return text;

}

}

/* ADD SCRIPT */

function addScript(){

let thumbInput=document.getElementById("thumb").value;
  
let title=document.getElementById("title").value.trim();
let category=document.getElementById("category").value.trim();

if(title==="" || category===""){
alert("Title and Category required");
return;
}

/* YouTube → Thumbnail */

if(
thumbInput.includes("youtube.com") || 
thumbInput.includes("youtu.be")
){

let videoId="";

if(thumbInput.includes("watch?v=")){
videoId=thumbInput.split("watch?v=")[1].split("&")[0];
}

if(thumbInput.includes("youtu.be/")){
videoId=thumbInput.split("youtu.be/")[1].split("?")[0];
}

if(videoId){
thumbInput=
"https://img.youtube.com/vi/"
+videoId+
"/maxresdefault.jpg";
}

}

let rawText =
document
.getElementById("script")
.value
.trim();

if(rawText===""){

alert("Script cannot be empty");
return;

}

/* ✅ confirm ต้องอยู่ตรงนี้ */

if(!confirm("Add this script?")){
return;
}
  
let scriptText = rawText;


/* CREATE */

let newScript={

id:Date.now(),

title:title,
category:category,

thumb:thumbInput,

script:scriptText,

trending:false

};

data.scripts.push(newScript);

render();

alert("Script added successfully!");

/* CLEAR FORM */

document.getElementById("title").value="";
document.getElementById("category").value="";
document.getElementById("thumb").value="";
document.getElementById("script").value="";

}

/* EDIT */

function editScript(id){

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}

let s=data.scripts[index];

document.getElementById("title").value=s.title;
document.getElementById("category").value=s.category;
document.getElementById("thumb").value=s.thumb;
document.getElementById("script").value=s.script;

data.scripts.splice(index,1);

render();

}
/* DELETE */

function deleteScript(id){

if(!confirm("Delete this script permanently?")){
return;
}

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}

data.scripts.splice(index,1);

render();

}
/* TRENDING */

function toggleTrending(id){

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}

let script=data.scripts[index];

let count=
data.scripts
.filter(s=>s.trending)
.length;

/* limit 3 */

if(!script.trending){

if(count>=3){

alert("Trending ได้สูงสุด 3 ตัว");
return;

}

}

script.trending=!script.trending;

render();

}


/* PREVIEW SCRIPT (SAFE + STABLE) */

function previewScript(id){

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}


let s = data.scripts[index];

if(!s.script){

alert("ไม่มีข้อมูล script");

return;

}

let raw =
s.script;

/* แปลงให้ปลอดภัยสำหรับ iframe */

let safeHTML =
raw
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

/* เปิดหน้าพรีวิว */

let win = window.open("", "_blank");

if(!win){

alert("Popup ถูกบล็อก");

return;

}

win.document.open();

win.document.write(`

<!DOCTYPE html>
<html>

<head>

<title>Preview</title>

<style>

body{
margin:0;
background:#111;
color:#0f0;
font-family:monospace;
padding:20px;
white-space:pre-wrap;
}

</style>

</head>

<body>

${safeHTML}

</body>

</html>

`);

win.document.close();

}
/* SAVE */

function download(){

/* บันทึกข้อมูลแบบตรง */

let jsText =
JSON.stringify(data,null,2);

/* export เป็น JS */

let blob=new Blob(
[jsText],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="database_backup_"+Date.now()+".json";

a.click();

}

function importDatabase(event){

let file = event.target.files[0];

if(!file){
return;
}

if(!confirm("Import database? Current data will be replaced.")){
return;
}

let reader = new FileReader();

reader.onload = function(e){

try{

let importedData =
JSON.parse(e.target.result);

/* ตรวจว่าเป็น database จริง */

if(!importedData.scripts || !Array.isArray(importedData.scripts)){
alert("Invalid database file");
return;
}

/* แทนที่ข้อมูล */

data = importedData;

/* บันทึกไฟล์ใหม่ */

download();

/* แสดงใหม่ */

render();

alert("Import successful!");

}catch(err){

alert("Import failed! File may be broken.");

}

};

reader.readAsText(file);

/* reset input */

event.target.value="";

}

</script>

</body>
</html>
