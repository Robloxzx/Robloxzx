<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#fff6e5;
padding:30px;
}

.login{
max-width:400px;
margin:auto;
text-align:center;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
background:#f4b942;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

#categoryFilter button.active{
background:#333;
color:white;
}

button:hover{
opacity:0.85;
}

/* ===== Layout ซ้าย-ขวา ===== */

.panel{
display:none;
gap:20px;
align-items:flex-start;
}

.formBox{
width:320px;
flex-shrink:0;
position:sticky;
top:20px;
height:fit-content;
}

.listBox{
flex:1;
}

/* ===== Card แบบมืออาชีพ ===== */

.card{
display:flex;
gap:12px;
align-items:flex-start;
background:white;
padding:12px;
border-radius:10px;
margin-top:10px;
animation:fadeIn 0.25s ease;
}

.card img{
width:100px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,0.08);
transition:0.15s;
}

/* ⭐ Trending Badge */

.thumbBox{
position:relative;
}

.trendingBadge{
position:absolute;
top:6px;
right:6px;
background:#ffd54f;
color:#333;
font-size:12px;
padding:2px 6px;
border-radius:6px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginBox">
  
<div id="loadingText" style="display:none;margin-top:10px;color:#555;">
⏳ Loading database...
</div>

<h2>Admin Login</h2>

<form onsubmit="login(); return false;">

<div style="position:relative;">

<input 
id="password" 
type="password" 
placeholder="Enter Password">



</div>

<br>

<button type="submit">
Login
</button>

</form>

</div>

<!-- PANEL -->

<div class="panel" id="panelBox">

<!-- LEFT FORM -->

<div class="formBox">

<h2>Script Manager</h2>

<input id="title" placeholder="Title">

<select id="category">

<option value="">-- Select Category --</option>

<option value="blox">blox</option>
<option value="anime">anime</option>
<option value="sim">sim</option>

</select>

<input 
id="thumb" 
placeholder="Paste YouTube URL or Image Thumbnail URL"
oninput="previewThumb()">

<img 
id="thumbPreview"
style="width:180px;border-radius:10px;display:none;margin-top:6px;">

<textarea id="script" placeholder="Script Code"></textarea>

<button onclick="addScript()">
➕ Add Script
</button>

<input 
type="file" 
id="importFile"
accept=".json"
style="display:none"
onchange="importDatabase(event)">

<button onclick="document.getElementById('importFile').click()">
📂 Import Database
</button>

<button onclick="download()">
💾 Export Database
</button>

</div>

<!-- RIGHT LIST -->

<div class="listBox">

<h3 id="scriptCount">
All Scripts (0)
</h3>

<input 
id="searchInput" 
placeholder="🔎 Search Script"
oninput="searchScript()">

<br>

<div id="categoryFilter">

<button onclick="setFilter('all')">
All
</button>

<button onclick="setFilter('blox')">
blox
</button>

<button onclick="setFilter('anime')">
anime
</button>

<button onclick="setFilter('sim')">
sim
</button>

</div>

<div id="list"></div>

</div>

</div>
  
<script>

let data = { scripts: [], trending: [] };
let currentFilter = "all";
let dbLoaded = false;

fetch("database.json")
.then(res => res.json())
.then(db => {

data = db;

console.log("Database loaded:", data);

dbLoaded = true;

})
.catch(err => {

console.error("โหลด database.json ไม่สำเร็จ", err);

dbLoaded = true; // ✅ เพิ่มบรรทัดนี้

});
</script>

<script>
  
/* PASSWORD */

const ADMIN_PASSWORD="551901";



function login(){

let pass=document
.getElementById("password")
.value
.trim();

if(pass===ADMIN_PASSWORD){

if(!dbLoaded){

document.getElementById("loadingText").style.display="block";

return;

}

console.log("Login button pressed");
  
document.getElementById("loginBox").style.display="none";

document.getElementById("panelBox").style.display="flex";

loadScripts();

}else{

alert("Wrong Password");

}

}


/* LOAD DATA */

function loadScripts(){

console.log("loadScripts called");

/* ถ้า database.js ไม่โหลด */



console.log("DATA =", data);

/* กัน scripts/trending หาย */

if(!data.scripts){
data.scripts=[];
}

if(!data.trending){
data.trending=[];
}

render();

}
/* RENDER */

function render(){

console.log("Rendering scripts:", data.scripts);

let list=document.getElementById("list");

list.innerHTML="";

/* ✅ อัปเดตจำนวน Script */

document.getElementById("scriptCount").innerText =
"All Scripts (" + data.scripts.length + ")";

/* ใช้ copy ก่อน sort */

[...data.scripts]

/* Filter Category */

.filter(s => {

if(currentFilter === "all"){
return true;
}

return s.category === currentFilter;

})

.sort((a,b)=>b.id-a.id)

.forEach((s)=>{

list.innerHTML+=createCard(s);

});

/* ⭐ เพิ่มตรงนี้ */

if(list.innerHTML===""){

list.innerHTML=`

<div style="
text-align:center;
padding:40px;
color:#777;
">

📂 ยังไม่มี Script<br>
<small>เพิ่ม Script แรกของคุณได้ทางซ้าย</small>

</div>

`;

}

}

/* CREATE CARD */

function createCard(s){

return `

<div class="thumbBox">

<img src="${s.thumb || 'https://via.placeholder.com/120'}">

${s.trending ? `
<div class="trendingBadge">
⭐ Trending
</div>
` : ""}

</div>

<b>
${(s.title || "").substring(0,80)}
</b>

<br>

<small>
Category: ${s.category}
</small>

<pre style="
max-height:70px;
overflow:auto;
background:#f5f5f5;
padding:6px;
border-radius:6px;
">

${escapeHTML(
(s.script || "").substring(0,200)
)}

</pre>

<div>

<button onclick="editScript(${s.id})">
✏️
</button>

<button onclick="deleteScript(${s.id})">
❌
</button>

<button 
onclick="toggleTrending(${s.id})"
style="
background:${s.trending ? '#ffd54f' : '#f4b942'};
">
⭐
</button>

<button onclick="previewScript(${s.id})">
👁
</button>

</div>

</div>

</div>

`;

}
/* SEARCH */

function searchScript(){

let keyword =
document
.getElementById("searchInput")
.value
.toLowerCase();

let list =
document.getElementById("list");

list.innerHTML="";

let filtered = [...data.scripts]

.filter(s => {

/* Filter Category */

if(currentFilter !== "all"){

if(s.category !== currentFilter){
return false;
}

}

/* Filter Search */

return (s.title || "")
.toLowerCase()
.includes(keyword);

})

.sort((a,b)=>b.id-a.id);


/* ✅ อัปเดตจำนวน */

document.getElementById("scriptCount").innerText =
"All Scripts (" + filtered.length + ")";


filtered.forEach((s)=>{

list.innerHTML += createCard(s);

});

if(list.innerHTML===""){

list.innerHTML=`

<div style="
text-align:center;
padding:40px;
color:#777;
">

🔎 ไม่พบ Script ที่ค้นหา

</div>

`;

}
  
}

function encodeBase64(text){

try{

return btoa(
unescape(
encodeURIComponent(text)
)
);

}catch(e){

console.warn("Encode error:", e);

return "";

}

}

function escapeHTML(text){

return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");

}

function decodeBase64(text){

if(!text) return "";

try{

return decodeURIComponent(
escape(
atob(text)
)
);

}catch(e){

console.warn("Decode error:", e);

return text;

}

}

/* ADD SCRIPT */

function addScript(){

let thumbInput=document.getElementById("thumb").value;
  
let title=document.getElementById("title").value.trim();
let category=document.getElementById("category").value.trim();

if(title===""){
alert("กรุณาใส่ Title");
return;
}

if(category===""){
alert("กรุณาเลือก Category");
return;
}

/* YouTube → Thumbnail */

if(
thumbInput.includes("youtube.com") || 
thumbInput.includes("youtu.be")
){

let videoId="";

if(thumbInput.includes("watch?v=")){
videoId=thumbInput.split("watch?v=")[1].split("&")[0];
}

if(thumbInput.includes("youtu.be/")){
videoId=thumbInput.split("youtu.be/")[1].split("?")[0];
}

if(videoId){
thumbInput=
"https://img.youtube.com/vi/"
+videoId+
"/maxresdefault.jpg";
}

}

let rawText =
document
.getElementById("script")
.value
.trim();

if(rawText===""){

alert("Script cannot be empty");
return;

}

/* ✅ confirm ต้องอยู่ตรงนี้ */

if(!confirm("Add this script?")){
return;
}
  
let scriptText = rawText;


/* CREATE */

let newScript={

id:Date.now(),

title:title,
category:category,

thumb:thumbInput,

script:scriptText,

trending:false

};

data.scripts.push(newScript);

render();

alert("Script added successfully!");showToast("Script added successfully!");
/* CLEAR FORM */

document.getElementById("title").value="";
document.getElementById("category").value="";
document.getElementById("thumb").value="";
document.getElementById("script").value="";

/* ✅ เคลียร์รูป preview */

document.getElementById("thumbPreview").style.display="none";
document.getElementById("thumbPreview").src="";
}

/* EDIT */

function editScript(id){

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}

let s=data.scripts[index];

document.getElementById("title").value = s.title || "";
document.getElementById("category").value = s.category || "blox";
document.getElementById("thumb").value = s.thumb || "";
document.getElementById("script").value = s.script || "";
/* ✅ แสดงรูปตอน edit */

previewThumb();

data.scripts.splice(index,1);

render();

}
/* DELETE */

function deleteScript(id){

if(!confirm("Delete this script permanently?")){
return;
}

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}

data.scripts.splice(index,1);

render();

}
/* TRENDING */

function toggleTrending(id){

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}

let script=data.scripts[index];

let count=
data.scripts
.filter(s=>s.trending)
.length;

/* limit 3 */

if(!script.trending){

if(count>=3){

showToast("⚠️ Trending ได้สูงสุด 3 ตัว");
return;

}

}

/* toggle */

script.trending=!script.trending;

/* แจ้งเตือน */

if(script.trending){

showToast("⭐ Set as Trending");

}else{

showToast("⭐ Removed from Trending");

}

render();

}


/* PREVIEW SCRIPT (SAFE + STABLE) */

function previewScript(id){

let index =
data.scripts.findIndex(s=>s.id===id);

if(index===-1){
alert("Script not found");
return;
}


let s = data.scripts[index];

if(!s.script){

alert("ไม่มีข้อมูล script");

return;

}

let raw =
s.script;

/* แปลงให้ปลอดภัยสำหรับ iframe */

let safeHTML =
raw
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

/* เปิดหน้าพรีวิว */

let win = window.open("", "_blank");

if(!win){

alert("Popup ถูกบล็อก");

return;

}

win.document.open();

win.document.write(`

<!DOCTYPE html>
<html>

<head>

<title>Preview</title>

<style>

body{
margin:0;
background:#111;
color:#0f0;
font-family:monospace;
padding:20px;
white-space:pre-wrap;
}

</style>

</head>

<body>

${safeHTML}

</body>

</html>

`);

win.document.close();

}
/* SAVE */

function download(){

/* บันทึกข้อมูลแบบตรง */

let jsText =
JSON.stringify(data,null,2);

/* export เป็น JS */

let blob=new Blob(
[jsText],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="database_backup_"+Date.now()+".json";

a.click();

}

function importDatabase(event){

let file = event.target.files[0];

if(!file){
return;
}

if(!confirm("Import database? Current data will be replaced.")){
return;
}

let reader = new FileReader();

reader.onload = function(e){

try{

let importedData =
JSON.parse(e.target.result);

/* ตรวจว่าเป็น database จริง */

if(!importedData.scripts || !Array.isArray(importedData.scripts)){
alert("Invalid database file");
return;
}

if(!importedData.trending){
importedData.trending=[];
}

/* แทนที่ข้อมูล */

data = importedData;

/* บันทึกไฟล์ใหม่ */

/* แสดงใหม่ */

render();

alert("Import successful!");

}catch(err){

alert("Import failed! File may be broken.");

}

};

reader.readAsText(file);

/* reset input */

event.target.value="";

}

function previewThumb(){

let thumbInput =
document.getElementById("thumb").value;

let preview =
document.getElementById("thumbPreview");

if(!thumbInput){

preview.style.display="none";
return;

}

/* YouTube → Thumbnail */

if(
thumbInput.includes("youtube.com") ||
thumbInput.includes("youtu.be")
){

let videoId="";

if(thumbInput.includes("watch?v=")){
videoId=
thumbInput
.split("watch?v=")[1]
.split("&")[0];
}

if(thumbInput.includes("youtu.be/")){
videoId=
thumbInput
.split("youtu.be/")[1]
.split("?")[0];
}

if(videoId){

thumbInput =
"https://img.youtube.com/vi/"
+videoId+
"/maxresdefault.jpg";

}

}

/* แสดงรูป */

preview.src = thumbInput;

preview.style.display="block";

}

function setFilter(category){

currentFilter = category;

/* highlight button */

document
.querySelectorAll("#categoryFilter button")
.forEach(btn=>btn.classList.remove("active"));

document
.querySelector(
`#categoryFilter button[onclick="setFilter('${category}')"]`
)
.classList.add("active");

/* reset search */

document.getElementById("searchInput").value = "";

render();

}

function showToast(text){

let toast =
document.getElementById("toast");

toast.innerText = text;

toast.style.display = "block";

setTimeout(()=>{

toast.style.display="none";

},2000);

}
  
</script>

<div id="toast"
style="
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:10px 16px;
border-radius:8px;
display:none;
z-index:999;
">
Saved
</div>
  
</body>
</html>
