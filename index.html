/* PAGINATION */

let perPage=8
let currentPage=1
let filtered=[...scripts]

function render(){

let start=(currentPage-1)*perPage
let end=start+perPage

let pageData=filtered.slice(start,end)

let grid=document.getElementById("scripts")
grid.innerHTML=""

pageData.forEach(s=>{

let thumb=s.thumb || defaultThumb

grid.innerHTML+=`

<div class="card">

<img src="${thumb}">

📜 Get Script
</button>

</div>

`

})

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage)

let html=""

html+=`<button onclick="goPage(1)">«</button>`
html+=`<button onclick="goPage(${currentPage-1})">‹</button>`

let start=Math.max(1,currentPage-3)
let end=Math.min(pages,currentPage+3)

for(let i=start;i<=end;i++){

html+=`<button class="${i==currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`

}

html+=`<button onclick="goPage(${currentPage+1})">›</button>`
html+=`<button onclick="goPage(${pages})">»</button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

let pages=Math.ceil(filtered.length/perPage)

if(p<1)p=1
if(p>pages)p=pages

currentPage=p
render()

}

document.getElementById("search").addEventListener("input",e=>{

filtered=scripts.filter(s=>s.title.toLowerCase().includes(t))

currentPage=1

render()

})

function filterCategory(cat){

if(cat=="all"){
filtered=[...scripts]
}else{
filtered=scripts.filter(s=>s.cat==cat)
}

currentPage=1
render()

}

/* HERO SNOW */

const canvas=document.getElementById("snowHero")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=canvas.offsetWidth
canvas.height=canvas.offsetHeight
}

resize()
window.addEventListener("resize",resize)

let snow=[]

for(let i=0;i<120;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.speed

if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

<script>
function openPage(key){

  const token = Math.random().toString(36).substring(2);
  const tabId = Math.random().toString(36).substring(2);
  const time = Date.now();

  sessionStorage.setItem("access_token", token);
  sessionStorage.setItem("access_time", time);
  sessionStorage.setItem("tab_id", tabId);

  window.location.href = "script1.html?key=" + key + "&t=" + token + "&tab=" + tabId;
}
</script>

<script>

    // ล้าง session เก่า
    sessionStorage.clear();

    // รีโหลดหน้า เพื่อบังคับ popup / เงื่อนไขใหม่
    location.reload();
  }
});
